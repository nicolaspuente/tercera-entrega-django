<h1>Páginas</h1>

<a href="{% url 'page_create' %}">Crear nueva página</a>

{% if object_list %}
    {% for page in object_list %}
        <div>
            <h2>{{ page.titulo }}</h2>
            <h3>{{ page.subtitulo }}</h3>
            <p>{{ page.fecha }}</p>

            {% if page.imagen %}
                <img src="{{ page.imagen.url }}" width="250">
            {% endif %}

            <br>
            <a href="{% url 'page_detail' page.pk %}">Leer más</a>
            <a href="{% url 'page_update' page.pk %}">Editar</a>
            <a href="{% url 'page_delete' page.pk %}">Borrar</a>
        </div>
        <hr>
    {% endfor %}
{% else %}
    <p>No hay páginas aún</p>
{% endif %}
