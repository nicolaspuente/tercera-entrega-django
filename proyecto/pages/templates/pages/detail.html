{% extends 'app/base.html' %}
{% block contenido %}
<h1>{{ object.titulo }}</h1>
<h3>{{ object.subtitulo }}</h3>

<p>Fecha: {{ object.fecha }}</p>
<p>Autor: {{ object.autor }}</p>

{% if object.imagen %}
    <img src="{{ object.imagen.url }}" width="400">
{% endif %}

<div>
    {{ object.contenido|safe }}
</div>

<br>

<a href="{% url 'pages' %}">Volver</a>
<a href="{% url 'page_update' object.pk %}">Editar</a>
<a href="{% url 'page_delete' object.pk %}">Borrar</a>
{% endblock %}
